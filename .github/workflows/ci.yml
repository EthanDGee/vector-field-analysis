name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Install system dependencies
        run: sudo apt-get install -y libhdf5-dev

      - name: Build
        run: mise run build

  test:
    name: Test
    runs-on: ubuntu-22.04
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Install system dependencies
        run: sudo apt-get install -y libhdf5-dev

      - name: Build
        run: mise run build

      - name: Test
        run: mise run test
